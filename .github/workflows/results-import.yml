name: Import des résultats d'étape

on:
  # Déclenchement manuel : numéro d'étape optionnel — si omis, détection
  # automatique de "l'étape du jour" (comme pour le déclenchement programmé).
  workflow_dispatch:
    inputs:
      competitionId:
        description: "Identifiant Gruppetto de la compétition (ex. tdf-2026)"
        required: false
        default: 'tdf-2026'
      stageNumber:
        description: "Numéro de l'étape à importer — laisser vide pour détecter automatiquement l'étape du jour"
        required: false
        default: ''
      pcsRaceSlug:
        description: "Slug PCS de la course (ex. tour-de-france)"
        required: false
        default: 'tour-de-france'
      pcsRaceYear:
        description: "Année de la course"
        required: false
        default: '2026'

  # Déclenchement programmé : toutes les 15 minutes, 15h-20h heure de
  # Paris (été = UTC+2) = 13h-18h UTC. Fenêtre large pour couvrir les
  # étapes qui finissent tôt comme tard ; les résultats officiels tombent
  # généralement 30 à 90 minutes après l'arrivée. Aucun paramètre fourni
  # ici — l'étape du jour est toujours détectée automatiquement via
  # competitions/{id}/stages (date == aujourd'hui). Un jour de repos ou
  # une absence de résultats publiés se solde simplement par "rien à
  # importer", jamais une erreur — le prochain passage réessaiera.
  schedule:
    - cron: '*/15 13-18 * * *'

# Un échec (souvent un 403 PCS lié à l'IP du runner, pas à notre code) a
# de vraies chances de passer sur une NOUVELLE tentative : chaque JOB
# provisionne un runner tout neuf, avec une adresse IP différente.
# Limité à 3 tentatives au total — au-delà, on laisse le prochain
# passage programmé (15 min plus tard) réessayer plutôt que de
# s'acharner dans la même fenêtre.
#
# ⚠️ Ne PAS revenir à un `gh run rerun` sur soi-même : ça échoue
# structurellement ("run cannot be rerun; already running"), un run ne
# peut pas se relancer tant qu'il n'est pas terminé. Des JOBS séparés,
# chaînés par `needs`/`if: failure()`, sont la bonne façon d'obtenir
# plusieurs runners/IP différents au sein d'un même déclenchement.
jobs:
  attempt-1:
    uses: ./.github/workflows/_results-import-attempt.yml
    with:
      competitionId: ${{ inputs.competitionId || 'tdf-2026' }}
      stageNumber: ${{ inputs.stageNumber || '' }}
      pcsRaceSlug: ${{ inputs.pcsRaceSlug || 'tour-de-france' }}
      pcsRaceYear: ${{ inputs.pcsRaceYear || '2026' }}
    secrets: inherit

  attempt-2:
    needs: attempt-1
    if: failure()
    uses: ./.github/workflows/_results-import-attempt.yml
    with:
      competitionId: ${{ inputs.competitionId || 'tdf-2026' }}
      stageNumber: ${{ inputs.stageNumber || '' }}
      pcsRaceSlug: ${{ inputs.pcsRaceSlug || 'tour-de-france' }}
      pcsRaceYear: ${{ inputs.pcsRaceYear || '2026' }}
    secrets: inherit

  attempt-3:
    needs: attempt-2
    if: failure()
    uses: ./.github/workflows/_results-import-attempt.yml
    with:
      competitionId: ${{ inputs.competitionId || 'tdf-2026' }}
      stageNumber: ${{ inputs.stageNumber || '' }}
      pcsRaceSlug: ${{ inputs.pcsRaceSlug || 'tour-de-france' }}
      pcsRaceYear: ${{ inputs.pcsRaceYear || '2026' }}
    secrets: inherit
