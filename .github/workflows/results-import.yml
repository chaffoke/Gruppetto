name: Import des résultats d'étape

on:
  # Déclenchement manuel : numéro d'étape optionnel — si omis, détection
  # automatique de "l'étape du jour" (comme pour le déclenchement programmé).
  workflow_dispatch:
    inputs:
      competitionId:
        description: "Identifiant Gruppetto de la compétition (ex. tdf-2026)"
        required: false
        default: 'tdf-2026'
      stageNumber:
        description: "Numéro de l'étape à importer — laisser vide pour détecter automatiquement l'étape du jour"
        required: false
        default: ''
      pcsRaceSlug:
        description: "Slug PCS de la course (ex. tour-de-france)"
        required: false
        default: 'tour-de-france'
      pcsRaceYear:
        description: "Année de la course"
        required: false
        default: '2026'

  # Déclenchement programmé : toutes les 15 minutes, 15h-20h heure de
  # Paris (été = UTC+2) = 13h-18h UTC. Fenêtre large pour couvrir les
  # étapes qui finissent tôt comme tard ; les résultats officiels tombent
  # généralement 30 à 90 minutes après l'arrivée. Aucun paramètre fourni
  # ici — l'étape du jour est toujours détectée automatiquement via
  # competitions/{id}/stages (date == aujourd'hui). Un jour de repos ou
  # une absence de résultats publiés se solde simplement par "rien à
  # importer", jamais une erreur — le prochain passage réessaiera.
  schedule:
    - cron: '*/15 13-18 * * *'

jobs:
  results-import:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: results
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install

      - name: Bibliothèques système pour Chromium (Puppeteer)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2t64 libpango-1.0-0 libcairo2

      - name: Lancer l'import des résultats d'étape
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          COMPETITION_ID: ${{ inputs.competitionId || 'tdf-2026' }}
          STAGE_NUMBER: ${{ inputs.stageNumber || '' }}
          PCS_RACE_SLUG: ${{ inputs.pcsRaceSlug || 'tour-de-france' }}
          PCS_RACE_YEAR: ${{ inputs.pcsRaceYear || '2026' }}
        run: node run.js
