name: Synchronisation des coureurs

on:
  schedule:
    # Passage de nuit : vérification définitive du jour, une fois calme.
    # 00h15 heure de Paris = 22h15 UTC en été / 23h15 UTC en hiver. Fixé en
    # été puisque c'est la période d'utilisation réelle.
    - cron: '15 22 * * *'
    # Pendant les heures de course : espacé à 2h plutôt que 30 min — les
    # abandons sont des événements rares (quelques-uns par étape, pas un
    # flux continu), inutile de marteler PCS aussi souvent, surtout
    # pendant que ses requêtes échouent en 403. Fenêtre 9h-19h heure de
    # Paris (été = UTC+2) = 7h-17h UTC.
    - cron: '0 7-17/2 * * *'
  # Déclenchement manuel, pour tester sans attendre le prochain passage.
  workflow_dispatch:
    inputs:
      raceId:
        description: "Course à synchroniser (ex. tour-de-france/2026)"
        required: false
        default: 'tour-de-france/2026'

# Limité à UNE seule tentative supplémentaire (2 jobs au total) — les
# échecs répétés de ces derniers jours montrent que retenter plus ne
# ferait que multiplier les notifications sans rien résoudre de plus
# qu'une seule reprise.
#
# ⚠️ Ne PAS revenir à un `gh run rerun` sur soi-même : ça échoue
# structurellement ("run cannot be rerun; already running"). Des JOBS
# séparés, chaînés par `needs`/`if: failure()`, sont la bonne façon
# d'obtenir un runner/IP différent au sein d'un même déclenchement.
jobs:
  attempt-1:
    uses: ./.github/workflows/_sync-riders-attempt.yml
    with:
      raceId: ${{ inputs.raceId || 'tour-de-france/2026' }}
      competitionId: 'tdf-2026'
    secrets: inherit

  attempt-2:
    needs: attempt-1
    if: failure()
    uses: ./.github/workflows/_sync-riders-attempt.yml
    with:
      raceId: ${{ inputs.raceId || 'tour-de-france/2026' }}
      competitionId: 'tdf-2026'
    secrets: inherit
