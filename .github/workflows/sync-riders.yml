name: Synchronisation des coureurs

on:
  schedule:
    # Passage de nuit : vérification définitive du jour, une fois calme.
    # 00h15 heure de Paris = 22h15 UTC en été / 23h15 UTC en hiver. Fixé en
    # été puisque c'est la période d'utilisation réelle.
    - cron: '15 22 * * *'
    # Pendant les heures de course : espacé à 2h plutôt que 30 min — les
    # abandons sont des événements rares (quelques-uns par étape, pas un
    # flux continu), inutile de marteler PCS aussi souvent, surtout
    # pendant que ses requêtes échouent en 403. Fenêtre 9h-19h heure de
    # Paris (été = UTC+2) = 7h-17h UTC.
    - cron: '0 7-17/2 * * *'
  # Déclenchement manuel, pour tester sans attendre le prochain passage.
  workflow_dispatch:
    inputs:
      raceId:
        description: "Course à synchroniser (ex. tour-de-france/2026)"
        required: false
        default: 'tour-de-france/2026'

permissions:
  actions: write   # nécessaire pour que le job puisse déclencher son propre re-lancement (gh run rerun)
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sync
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install

      - name: Bibliothèques système pour Chromium (Puppeteer)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2t64 libpango-1.0-0 libcairo2

      - name: Lancer la synchronisation
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SYNC_RACE_ID: ${{ inputs.raceId || 'tour-de-france/2026' }}
          COMPETITION_ID: 'tdf-2026'
        run: node run.js

      # Même logique que results-import.yml : un 403 est souvent lié à
      # l'IP du runner, pas au code — une nouvelle tentative provisionne un
      # runner neuf avec une IP différente. Limité à UNE seule tentative
      # supplémentaire (2 au total) — les échecs répétés de ces derniers
      # jours montrent que retenter 3 fois ne fait surtout que multiplier
      # les notifications sans rien résoudre de plus qu'une seule reprise.
      - name: Re-lancer automatiquement en cas d'échec (nouvelle IP à chaque tentative)
        if: failure() && fromJSON(github.run_attempt) < 2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run rerun ${{ github.run_id }} --failed
